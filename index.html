<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创艺品牌数据中心</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f5ff;overflow:hidden;height:100vh;}
    #particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
    
    /* 登录 */
    .login-container{display:flex;justify-content:center;align-items:center;height:100vh;position:relative;z-index:1;}
    .login-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 30%,#bfdbfe 60%,#93c5fd 100%);z-index:0;}
    .login-box{position:relative;z-index:1;background:rgba(255,255,255,0.55);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:28px;padding:55px 50px;width:430px;text-align:center;border:1px solid rgba(255,255,255,0.7);box-shadow:0 25px 60px rgba(0,50,120,0.12),0 0 0 1px rgba(59,130,246,0.1) inset;transition:transform 0.1s ease-out;}
    .login-box h2{font-size:30px;color:#0f172a;font-weight:700;margin-bottom:6px;letter-spacing:0.5px;}
    .login-box .subtitle{font-size:14px;color:#64748b;margin-bottom:36px;}
    .input-group{margin-bottom:22px;text-align:left;}
    .input-group label{display:block;font-size:13px;color:#334155;margin-bottom:6px;font-weight:600;}
    .login-box input{width:100%;padding:15px 16px;background:rgba(255,255,255,0.85);border:1px solid rgba(59,130,246,0.2);border-radius:14px;color:#1e293b;font-size:15px;outline:none;transition:0.25s;}
    .login-box input:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 4px rgba(59,130,246,0.1);}
    .login-box button{width:100%;padding:15px;background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px;box-shadow:0 8px 20px rgba(37,99,235,0.3);transition:0.2s;}
    .login-box button:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,99,235,0.4);}
    .login-error{color:#ef4444;margin-top:16px;font-size:14px;min-height:20px;}

    /* 后台框架 */
    .app-container{display:none;height:100vh;position:relative;z-index:1;background:linear-gradient(180deg,#f0f5ff 0%,#f8fafc 100%);}
    .sidebar{width:230px;height:100vh;background:#ffffff;position:fixed;left:0;top:0;display:flex;flex-direction:column;padding:20px 0;border-right:1px solid #e2e8f0;box-shadow:2px 0 20px rgba(0,0,0,0.03);z-index:10;}
    .sidebar-logo{font-size:17px;font-weight:700;color:#1e293b;padding:6px 20px 28px;letter-spacing:0.5px;display:flex;align-items:center;gap:8px;}
    .sidebar-logo span{width:8px;height:8px;background:#3b82f6;border-radius:50%;display:inline-block;box-shadow:0 0 8px rgba(59,130,246,0.5);}
    .nav-group{margin-bottom:6px;}
    .nav-item{padding:12px 20px;color:#475569;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:space-between;transition:0.15s;font-weight:500;border-radius:0;margin:1px 8px;border-radius:10px;}
    .nav-item:hover{background:#f1f5f9;color:#1e293b;}
    .nav-item.active{background:#eff6ff;color:#2563eb;font-weight:600;}
    .nav-item .left{display:flex;align-items:center;gap:10px;}
    .nav-item .arrow{font-size:10px;transition:0.2s;color:#94a3b8;}
    .nav-item .arrow.open{transform:rotate(90deg);}
    .sub-nav{display:none;padding-left:16px;}
    .sub-nav.show{display:block;}
    .sub-item{padding:10px 20px 10px 48px;color:#64748b;cursor:pointer;font-size:13px;transition:0.15s;border-radius:8px;margin:1px 8px;}
    .sub-item:hover{background:#f8fafc;color:#334155;}
    .sub-item.active{background:#eff6ff;color:#2563eb;font-weight:500;}

    .main-content{margin-left:230px;padding:24px 30px;height:100vh;overflow-y:auto;}
    .top-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:28px;gap:16px;}
    .user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;cursor:pointer;position:relative;transition:0.2s;box-shadow:0 2px 8px rgba(37,99,235,0.2);}
    .user-avatar:hover{box-shadow:0 4px 16px rgba(37,99,235,0.35);}
    .user-dropdown{display:none;position:absolute;top:48px;right:0;background:#fff;border-radius:14px;box-shadow:0 20px 40px rgba(0,0,0,0.1);border:1px solid #e2e8f0;width:180px;z-index:100;overflow:hidden;}
    .user-dropdown.show{display:block;}
    .user-dropdown .item{padding:12px 18px;cursor:pointer;font-size:14px;color:#334155;transition:0.15s;}
    .user-dropdown .item:hover{background:#f8fafc;color:#1e293b;}
    .user-dropdown .item.danger{color:#ef4444;}
    .user-dropdown .item.danger:hover{background:#fef2f2;}

    .page{display:none;}
    .page.active{display:block;}

    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px;}
    .kpi-card{background:#fff;border-radius:18px;padding:22px 20px;border:1px solid #eef2f6;box-shadow:0 2px 12px rgba(0,0,0,0.02);transition:0.2s;}
    .kpi-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.06);transform:translateY(-2px);}
    .kpi-card .label{font-size:13px;color:#64748b;margin-bottom:10px;font-weight:500;}
    .kpi-card .value{font-size:34px;font-weight:700;color:#0f172a;}
    .kpi-card .sub{font-size:12px;color:#94a3b8;margin-top:6px;}
    .kpi-card.brand-card{border-left:4px solid #3b82f6;}
    .kpi-card.brand-card.orange{border-left-color:#f59e0b;}

    .card{background:#fff;border-radius:20px;padding:24px;border:1px solid #eef2f6;box-shadow:0 2px 16px rgba(0,0,0,0.02);margin-bottom:24px;}
    .card h3{font-size:17px;margin-bottom:20px;color:#0f172a;font-weight:600;display:flex;align-items:center;gap:8px;}
    .card h3::before{content:'';display:inline-block;width:4px;height:18px;background:#3b82f6;border-radius:2px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:13px 12px;color:#64748b;font-weight:600;border-bottom:2px solid #f1f5f9;font-size:13px;}
    td{padding:12px 12px;border-bottom:1px solid #f8fafc;font-size:14px;color:#334155;}
    tr:hover td{background:#fafbfd;}

    .status-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;}
    .status-tag.published{background:#dcfce7;color:#16a34a;}
    .status-tag.editing{background:#fef3c7;color:#d97706;}
    .status-tag.shooting{background:#e0f2fe;color:#0284c7;}
    .status-tag.pending{background:#f1f5f9;color:#64748b;}

    .task-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;}
    .task-tag.shoot{background:#fef3c7;color:#d97706;}
    .task-tag.edit{background:#e0f2fe;color:#0284c7;}
    .task-tag.publish{background:#dcfce7;color:#16a34a;}
    .task-tag.other{background:#f1f5f9;color:#64748b;}

    .chart-box{width:100%;height:320px;}
    .platform-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
    .platform-bar .name{width:60px;font-size:13px;color:#64748b;font-weight:500;}
    .platform-bar .bar{flex:1;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;}
    .platform-bar .fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:5px;transition:width 0.6s ease;}

    .week-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .week-tab{padding:7px 18px;border-radius:20px;background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;cursor:pointer;font-size:13px;font-weight:500;}
    .week-tab.active{background:#eff6ff;border-color:#3b82f6;color:#2563eb;}

    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:200;justify-content:center;align-items:center;}
    .modal-overlay.show{display:flex;}
    .modal{background:#fff;border-radius:20px;padding:30px;width:420px;box-shadow:0 30px 60px rgba(0,0,0,0.15);}
    .modal h3{font-size:18px;margin-bottom:20px;color:#0f172a;}
    .modal .form-group{margin-bottom:18px;}
    .modal .form-group label{display:block;font-size:13px;color:#334155;margin-bottom:6px;font-weight:500;}
    .modal .form-group input{width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;}
    .modal .form-group input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
    .modal .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
    .btn{padding:10px 22px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:0.2s;}
    .btn-primary{background:#3b82f6;color:#fff;}
    .btn-primary:hover{background:#2563eb;}
    .btn-secondary{background:#f1f5f9;color:#475569;}
    .btn-secondary:hover{background:#e2e8f0;}

    .json-output{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:12px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:500px;overflow-y:auto;margin-top:16px;}

    @media(max-width:768px){
      .sidebar{width:60px;}
      .sidebar .nav-item .left span:last-child,.sidebar-logo,.sub-nav{display:none;}
      .main-content{margin-left:60px;}
      .kpi-row{grid-template-columns:1fr 1fr;}
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="login-bg" id="loginBg" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"></div>

  <!-- 登录 -->
  <div id="loginPage" class="login-container">
    <div class="login-box" id="loginBox">
      <h2>创艺品牌数据中心</h2>
      <div class="subtitle">CHUANGYI BRAND DATA CENTER</div>
      <div class="input-group"><label>账号</label><input type="text" id="usernameInput" placeholder="输入您的账号"></div>
      <div class="input-group"><label>密码</label><input type="password" id="passwordInput" placeholder="输入您的密码"></div>
      <button onclick="login()">进入系统</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- 后台 -->
  <div id="appContainer" class="app-container">
    <div class="sidebar">
      <div class="sidebar-logo"><span></span>数据中心</div>
      <div class="nav-item active" data-page="dashboard" onclick="toggleNav(this,'dashboard')"><div class="left">📊 数据大盘</div></div>
      <div class="nav-group">
        <div class="nav-item" data-page="content" onclick="toggleNav(this,'content')"><div class="left">🎬 内容管理</div><span class="arrow">▶</span></div>
        <div class="sub-nav" id="sub-content">
          <div class="sub-item active" data-page="content-plan" onclick="switchPage('content-plan')">发布计划</div>
          <div class="sub-item" data-page="content-list" onclick="switchPage('content-list')">视频列表</div>
          <div class="sub-item" data-page="content-add" onclick="switchPage('content-add')">添加视频</div>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-item" data-page="schedule" onclick="toggleNav(this,'schedule')"><div class="left">📅 排期计划</div><span class="arrow">▶</span></div>
        <div class="sub-nav" id="sub-schedule">
          <div class="sub-item" data-page="schedule-chuangyi" onclick="switchPage('schedule-chuangyi')">创艺装饰</div>
          <div class="sub-item" data-page="schedule-xikexi" onclick="switchPage('schedule-xikexi')">喜客喜装饰</div>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-item" data-page="analysis" onclick="toggleNav(this,'analysis')"><div class="left">📈 品牌分析</div><span class="arrow">▶</span></div>
        <div class="sub-nav" id="sub-analysis">
          <div class="sub-item" data-page="analysis-chuangyi" onclick="switchPage('analysis-chuangyi')">创艺装饰</div>
          <div class="sub-item" data-page="analysis-xikexi" onclick="switchPage('analysis-xikexi')">喜客喜装饰</div>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-item" data-page="maintain" onclick="toggleNav(this,'maintain')"><div class="left">🔧 数据维护</div><span class="arrow">▶</span></div>
        <div class="sub-nav" id="sub-maintain">
          <div class="sub-item" data-page="maintain-wechat" onclick="switchPage('maintain-wechat')">视频号</div>
          <div class="sub-item" data-page="maintain-kuaishou" onclick="switchPage('maintain-kuaishou')">快手</div>
          <div class="sub-item" data-page="maintain-douyin" onclick="switchPage('maintain-douyin')">抖音</div>
          <div class="sub-item" data-page="maintain-bilibili" onclick="switchPage('maintain-bilibili')">B站</div>
          <div class="sub-item" data-page="maintain-weibo" onclick="switchPage('maintain-weibo')">微博</div>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="top-bar">
        <div class="user-avatar" id="userAvatar" onclick="toggleUserDropdown()">A</div>
        <div class="user-dropdown" id="userDropdown">
          <div class="item" onclick="showProfile()">个人中心</div>
          <div class="item" onclick="showChangePassword()">修改密码</div>
          <div class="item danger" onclick="logout()">退出登录</div>
        </div>
      </div>
      <div id="pageContent"></div>
    </div>
  </div>

  <!-- 修改密码弹窗 -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal">
      <h3>修改密码</h3>
      <div class="form-group"><label>当前密码</label><input type="password" id="oldPassword" placeholder="输入当前密码"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="newPassword" placeholder="输入新密码"></div>
      <div class="form-group"><label>确认新密码</label><input type="password" id="confirmPassword" placeholder="再次输入新密码"></div>
      <div id="passwordError" style="color:#ef4444;font-size:13px;margin-bottom:10px;"></div>
      <div class="btn-row"><button class="btn btn-secondary" onclick="closePasswordModal()">取消</button><button class="btn btn-primary" onclick="changePassword()">确认修改</button></div>
    </div>
  </div>

  <script>
    // ===== 鼠标交互粒子 =====
    (function(){
      const c=document.getElementById('particleCanvas'),ctx=c.getContext('2d');
      let p=[],w,h,mx=0,my=0;
      function r(){w=c.width=innerWidth;h=c.height=innerHeight}
      addEventListener('resize',r);r();
      addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
      for(let i=0;i<100;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*4+2,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6,o:Math.random()*.4+.15});
      function d(){
        ctx.clearRect(0,0,w,h);
        p.forEach(a=>{
          let dx=mx-a.x,dy=my-a.y,dist=Math.hypot(dx,dy);
          if(dist<180){a.x+=dx*0.003;a.y+=dy*0.003}
          else{a.x+=a.dx;a.y+=a.dy}
          if(a.x<0||a.x>w)a.dx*=-1;if(a.y<0||a.y>h)a.dy*=-1;
          ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
          ctx.fillStyle=`rgba(59,130,246,${a.o})`;ctx.fill();
          p.forEach(b=>{const dt=Math.hypot(a.x-b.x,a.y-b.y);if(dt<130){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(59,130,246,${.06*(1-dt/130)})`;ctx.lineWidth=.5;ctx.stroke()}})
        });
        requestAnimationFrame(d);
      }
      d();
    })();

    // 登录框微动
    document.addEventListener('mousemove',e=>{
      const box=document.getElementById('loginBox');if(!box||box.style.display==='none')return;
      const cx=innerWidth/2,cy=innerHeight/2,dx=(e.clientX-cx)/cx*3,dy=(e.clientY-cy)/cy*3;
      box.style.transform=`translate(${dx}px,${dy}px)`;
    });

    let appData=null,currentUser=null;
    const PLATFORMS=['视频号','快手','抖音','B站','微博'];
    fetch('data.json').then(r=>r.json()).then(d=>{appData=d});

    function login(){
      const u=document.getElementById('usernameInput').value.trim();
      const pw=document.getElementById('passwordInput').value.trim();
      const err=document.getElementById('loginError');
      if(!appData){err.textContent='数据加载中...';return}
      const user=(appData.users||[]).find(x=>x.username===u&&x.password===pw);
      if(user){
        currentUser=user;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('loginBg').style.display='none';
        document.getElementById('particleCanvas').style.display='none';
        document.getElementById('appContainer').style.display='block';
        document.getElementById('userAvatar').textContent=user.username[0].toUpperCase();
        switchPage('dashboard');
      }else err.textContent='账号或密码错误';
    }
    function logout(){
      document.getElementById('appContainer').style.display='none';
      document.getElementById('loginPage').style.display='flex';
      document.getElementById('loginBg').style.display='block';
      document.getElementById('particleCanvas').style.display='block';
      document.getElementById('usernameInput').value='';
      document.getElementById('passwordInput').value='';
    }

    function toggleUserDropdown(){
      document.getElementById('userDropdown').classList.toggle('show');
    }
    document.addEventListener('click',e=>{
      if(!e.target.closest('.user-avatar')&&!e.target.closest('.user-dropdown'))
        document.getElementById('userDropdown').classList.remove('show');
    });

    function showProfile(){
      document.getElementById('userDropdown').classList.remove('show');
      alert(`当前用户：${currentUser?.username||'未知'}\n角色：运营管理`);
    }
    function showChangePassword(){
      document.getElementById('userDropdown').classList.remove('show');
      document.getElementById('passwordModal').classList.add('show');
      document.getElementById('oldPassword').value='';
      document.getElementById('newPassword').value='';
      document.getElementById('confirmPassword').value='';
      document.getElementById('passwordError').textContent='';
    }
    function closePasswordModal(){
      document.getElementById('passwordModal').classList.remove('show');
    }
    function changePassword(){
      const old=document.getElementById('oldPassword').value.trim();
      const nw=document.getElementById('newPassword').value.trim();
      const cf=document.getElementById('confirmPassword').value.trim();
      const err=document.getElementById('passwordError');
      if(old!==currentUser.password){err.textContent='当前密码错误';return}
      if(nw.length<3){err.textContent='新密码至少3位';return}
      if(nw!==cf){err.textContent='两次密码不一致';return}
      const user=appData.users.find(x=>x.username===currentUser.username);
      if(user)user.password=nw;
      currentUser.password=nw;
      alert('密码修改成功！请复制下方JSON到GitHub更新：\n\n'+JSON.stringify(appData.users,null,2));
      closePasswordModal();
    }

    function toggleNav(el,group){
      const sub=document.getElementById('sub-'+group);
      const arrow=el.querySelector('.arrow');
      if(sub){
        sub.classList.toggle('show');
        if(arrow)arrow.classList.toggle('open');
      }else{
        switchPage(el.dataset.page);
      }
    }

    function switchPage(page){
      document.querySelectorAll('.nav-item,.sub-item').forEach(n=>n.classList.remove('active'));
      document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
      const mc=document.getElementById('pageContent');
      if(page==='dashboard')renderDashboard(mc);
      else if(page==='content-plan')renderContentPlan(mc);
      else if(page==='content-list')renderContentList(mc);
      else if(page==='content-add')renderContentAdd(mc);
      else if(page==='schedule-chuangyi')renderSchedule(mc,'创艺装饰');
      else if(page==='schedule-xikexi')renderSchedule(mc,'喜客喜装饰');
      else if(page==='analysis-chuangyi')renderAnalysis(mc,'创艺装饰');
      else if(page==='analysis-xikexi')renderAnalysis(mc,'喜客喜装饰');
      else if(page.startsWith('maintain-')){const p=page.replace('maintain-','');renderMaintain(mc,PLATFORMS.find(x=>{if(x==='视频号')return p==='wechat';if(x==='快手')return p==='kuaishou';if(x==='抖音')return p==='douyin';if(x==='B站')return p==='bilibili';if(x==='微博')return p==='weibo';}));}
    }

    function formatNum(n){if(n>=10000)return (n/10000).toFixed(1)+'w';if(n>=1000)return (n/1000).toFixed(1)+'k';return n.toString();}
    function getBrandData(brand){return (appData?.videos||[]).filter(v=>v.brand===brand)}
    function getPublished(videos){return videos.filter(v=>v.status==='已发布')}
    function sumPlatform(videos,key){return videos.reduce((s,v)=>{PLATFORMS.forEach(p=>{s+=(v.platforms?.[p]?.[key]||0)});return s},0)}
    function sumPlatformMonth(videos,key,month='07'){return videos.filter(v=>v.planned_date?.startsWith('2026-'+month)).reduce((s,v)=>{PLATFORMS.forEach(p=>{s+=(v.platforms?.[p]?.[key]||0)});return s},0)}
    function platformTotal(videos,platform,key){return videos.reduce((s,v)=>s+(v.platforms?.[platform]?.[key]||0),0)}

    // ===== 数据大盘 =====
    function renderDashboard(mc){
      if(!appData)return;
      const cy=getBrandData('创艺装饰'),xk=getBrandData('喜客喜装饰');
      const cyPub=getPublished(cy),xkPub=getPublished(xk);
      const cyViews=sumPlatform(cyPub,'views'),xkViews=sumPlatform(xkPub,'views');
      const cyMonthViews=sumPlatformMonth(cyPub,'views'),xkMonthViews=sumPlatformMonth(xkPub,'views');
      const totalPub=cyPub.length+xkPub.length,totalPlan=cy.length+xk.length;
      const platData=PLATFORMS.map(p=>({name:p,views:platformTotal(cyPub.concat(xkPub),p,'views')}));
      const weeks=appData.weekly_tasks||[];

      mc.innerHTML=`
        <div class="kpi-row">
          <div class="kpi-card brand-card"><div class="label">🏠 创艺装饰 · 累计总播放</div><div class="value">${formatNum(cyViews)}</div><div class="sub">本月新增 ${formatNum(cyMonthViews)}</div></div>
          <div class="kpi-card brand-card orange"><div class="label">🏡 喜客喜装饰 · 累计总播放</div><div class="value">${formatNum(xkViews)}</div><div class="sub">本月新增 ${formatNum(xkMonthViews)}</div></div>
          <div class="kpi-card"><div class="label">📹 本月已发布视频</div><div class="value">${totalPub}<span style="font-size:16px;color:#64748b;"> / ${totalPlan}</span></div><div class="sub">计划总数 ${totalPlan} 条</div></div>
          <div class="kpi-card"><div class="label">👁️ 全平台总播放</div><div class="value">${formatNum(cyViews+xkViews)}</div><div class="sub">5个平台合计</div></div>
        </div>
        <div class="grid-2">
          <div class="card"><h3>各平台播放量对比</h3>${platData.map(p=>`<div class="platform-bar"><span class="name">${p.name}</span><div class="bar"><div class="fill" style="width:${Math.round(p.views/Math.max(...platData.map(x=>x.views),1)*100)}%"></div></div><span style="font-size:13px;color:#334155;min-width:60px;text-align:right;">${formatNum(p.views)}</span></div>`).join('')}</div>
          <div class="card"><h3>每周执行汇总</h3><div id="weekBarChart" class="chart-box"></div></div>
        </div>
      `;
      setTimeout(()=>{
        const bc=document.getElementById('weekBarChart');if(bc){const ch=echarts.init(bc);ch.setOption({tooltip:{trigger:'axis'},xAxis:{type:'category',data:weeks.map(w=>w.week),axisLabel:{color:'#64748b',rotate:15,fontSize:11}},yAxis:{type:'value',axisLabel:{color:'#64748b'}},series:[{name:'出片',type:'bar',data:weeks.map(w=>w.output),color:'#3b82f6',barWidth:'18',itemStyle:{borderRadius:[6,6,0,0]}},{name:'拍摄',type:'bar',data:weeks.map(w=>w.shoot),color:'#f59e0b',barWidth:'18',itemStyle:{borderRadius:[6,6,0,0]}}]})}
      },100);
    }

    // ===== 内容管理 - 发布计划 =====
    function renderContentPlan(mc){
      const videos=appData?.videos||[];
      mc.innerHTML=`<div class="card"><h3>视频发布计划</h3><table><tr><th>品牌</th><th>视频标题</th><th>类型</th><th>计划日期</th><th>时间</th><th>状态</th></tr>${videos.map(v=>`<tr><td>${v.brand}</td><td>${v.title}</td><td>${v.type}</td><td>${v.planned_date}</td><td>${v.planned_time}</td><td><span class="status-tag ${v.status==='已发布'?'published':v.status==='剪辑中'?'editing':v.status==='拍摄中'?'shooting':'pending'}">${v.status}</span></td></tr>`).join('')}</table></div>`;
    }

    // ===== 内容管理 - 视频列表 =====
    function renderContentList(mc){
      const videos=appData?.videos||[];
      mc.innerHTML=`<div class="card"><h3>全部视频列表</h3><table><tr><th>ID</th><th>品牌</th><th>标题</th><th>类型</th><th>日期</th><th>状态</th><th>总播放</th></tr>${videos.map(v=>{const tv=sumPlatform([v],'views');return`<tr><td>${v.id}</td><td>${v.brand}</td><td>${v.title}</td><td>${v.type}</td><td>${v.planned_date}</td><td><span class="status-tag ${v.status==='已发布'?'published':v.status==='剪辑中'?'editing':v.status==='拍摄中'?'shooting':'pending'}">${v.status}</span></td><td>${formatNum(tv)}</td></tr>`}).join('')}</table></div>`;
    }

    // ===== 内容管理 - 添加视频 =====
    function renderContentAdd(mc){
      mc.innerHTML=`<div class="card"><h3>添加新视频</h3><p style="color:#64748b;margin-bottom:16px;">填写信息后生成JSON，复制到GitHub data.json的videos数组中。</p>
        <div class="form-group"><label>品牌</label><select id="addBrand" style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:10px;"><option>创艺装饰</option><option>喜客喜装饰</option></select></div>
        <div class="form-group"><label>视频标题</label><input type="text" id="addTitle" placeholder="例如：完工实景案例"></div>
        <div class="form-group"><label>类型</label><input type="text" id="addType" placeholder="例如：案例展示"></div>
        <div class="form-group"><label>计划日期</label><input type="date" id="addDate" value="2026-07-01"></div>
        <div class="form-group"><label>计划时间</label><input type="time" id="addTime" value="10:00"></div>
        <button class="btn btn-primary" onclick="generateNewVideo()">生成JSON</button>
        <div class="json-output" id="addOutput" style="display:none;"></div>
      </div>`;
    }
    function generateNewVideo(){
      const brand=document.getElementById('addBrand').value;
      const title=document.getElementById('addTitle').value;
      const type=document.getElementById('addType').value;
      const date=document.getElementById('addDate').value;
      const time=document.getElementById('addTime').value;
      const platforms={};
      PLATFORMS.forEach(p=>{platforms[p]={published:false,publish_time:null,views:0,likes:0,comments:0,shares:0}});
      const maxId=Math.max(...(appData?.videos||[]).map(v=>v.id),0);
      const newVideo={id:maxId+1,brand,title,type,planned_date:date,planned_time:time,status:'待拍摄',platforms};
      const out=document.getElementById('addOutput');
      out.style.display='block';
      out.textContent=JSON.stringify(newVideo,null,2)+'\n\n// 复制上面内容，添加到data.json的videos数组中';
    }

    // ===== 排期计划 =====
    function renderSchedule(mc,brand){
      const weeks=appData?.weekly_tasks||[];
      mc.innerHTML=`<div class="card"><h3>${brand} · 周计划详情</h3><div class="week-tabs" id="weekTabBar"></div><table id="weekDetailTable"><thead><tr><th>日期</th><th>动作</th><th>任务</th></tr></thead><tbody></tbody></table></div>`;
      let idx=0;
      window._renderWeek=function(i){
        idx=i;
        document.getElementById('weekTabBar').innerHTML=weeks.map((w,j)=>`<div class="week-tab ${j===i?'active':''}" onclick="window._renderWeek(${j})">${w.week.split(' ')[0]}</div>`).join('');
        const cur=weeks[i];if(!cur)return;
        document.querySelector('#weekDetailTable tbody').innerHTML=cur.tasks.map(t=>{let cls='';if(t.tag==='拍摄')cls='shoot';else if(t.tag==='剪辑'||t.tag==='定稿'||t.tag==='审核')cls='edit';else if(t.tag==='发布')cls='publish';else cls='other';return`<tr><td>${t.day}</td><td><span class="task-tag ${cls}">${t.action}</span></td><td>${t.detail}</td></tr>`}).join('');
      };
      window._renderWeek(0);
    }

    // ===== 品牌分析 =====
    function renderAnalysis(mc,brand){
      const videos=getBrandData(brand);
      const typeCount={};videos.forEach(v=>typeCount[v.type]=(typeCount[v.type]||0)+1);
      const treeData={name:brand,children:Object.entries(typeCount).map(([type,count])=>({name:type,children:videos.filter(v=>v.type===type).map(v=>({name:v.title}))}))};
      const platData=PLATFORMS.map(p=>({name:p,views:platformTotal(videos,p,'views')}));
      mc.innerHTML=`
        <div class="card"><h3>${brand} · 视频类型树状图</h3><div id="treeChart" class="chart-box"></div></div>
        <div class="card"><h3>各平台播放量</h3>${platData.map(p=>`<div class="platform-bar"><span class="name">${p.name}</span><div class="bar"><div class="fill" style="width:${Math.round(p.views/Math.max(...platData.map(x=>x.views),1)*100)}%"></div></div><span style="font-size:13px;color:#334155;min-width:60px;text-align:right;">${formatNum(p.views)}</span></div>`).join('')}</div>
      `;
      setTimeout(()=>{
        const tc=document.getElementById('treeChart');if(tc){const ch=echarts.init(tc);ch.setOption({tooltip:{trigger:'item'},series:[{type:'tree',data:[treeData],top:'5%',left:'8%',bottom:'5%',right:'12%',symbolSize:7,orient:'LR',label:{position:'right',verticalAlign:'middle',align:'left',fontSize:12,color:'#334155'},leaves:{label:{position:'right',verticalAlign:'middle',align:'left'}},expandAndCollapse:true}]})}
      },100);
    }

    // ===== 数据维护 =====
    function renderMaintain(mc,platform){
      const videos=appData?.videos||[];
      mc.innerHTML=`<div class="card"><h3>${platform} · 数据维护</h3><p style="color:#64748b;margin-bottom:16px;">修改数据后点击生成JSON，复制去GitHub替换data.json</p>${videos.map((v,i)=>{const d=v.platforms?.[platform]||{};return`<div style="background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;"><span style="width:160px;font-weight:500;">${v.brand} · ${v.title}</span><input type="number" id="views_${i}" value="${d.views||0}" placeholder="播放" style="width:100px;"><input type="number" id="likes_${i}" value="${d.likes||0}" placeholder="点赞" style="width:90px;"><input type="number" id="comments_${i}" value="${d.comments||0}" placeholder="评论" style="width:90px;"><input type="number" id="shares_${i}" value="${d.shares||0}" placeholder="转发" style="width:90px;"><label style="font-size:13px;"><input type="checkbox" id="pub_${i}" ${d.published?'checked':''}> 已发布</label></div>`}).join('')}<button class="btn btn-primary" onclick="generateMaintainJSON('${platform}')">生成JSON</button><div class="json-output" id="maintainOutput" style="display:none;"></div></div>`;
    }
    function generateMaintainJSON(platform){
      const data=JSON.parse(JSON.stringify(appData));
      data.videos.forEach((v,i)=>{
        v.platforms[platform].views=parseInt(document.getElementById(`views_${i}`).value)||0;
        v.platforms[platform].likes=parseInt(document.getElementById(`likes_${i}`).value)||0;
        v.platforms[platform].comments=parseInt(document.getElementById(`comments_${i}`).value)||0;
        v.platforms[platform].shares=parseInt(document.getElementById(`shares_${i}`).value)||0;
        v.platforms[platform].published=document.getElementById(`pub_${i}`).checked;
      });
      const out=document.getElementById('maintainOutput');
      out.style.display='block';
      out.textContent=JSON.stringify(data,null,2);
    }
  </script>
</body>
</html>
