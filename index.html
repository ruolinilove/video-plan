<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>创艺品牌数据中心</title>


<!-- Echarts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>


<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<!-- CSS -->
<link rel="stylesheet" href="css/style.css">


</head>



<body>


<!-- 粒子背景 -->

<canvas id="particleCanvas"></canvas>



<!-- 登录背景 -->

<div 
class="login-bg"
id="loginBg">
</div>




<!-- ================= 登录页面 ================= -->

<div 
id="loginPage"
class="login-container">


<div 
class="login-box"
id="loginBox">


<h2>
创艺品牌数据中心
</h2>


<div class="subtitle">

CHUANGYI BRAND DATA CENTER

</div>



<div class="input-group">


<label>
账号
</label>


<input 
id="usernameInput"
type="text"
placeholder="输入您的账号"
>


</div>




<div class="input-group">


<label>
密码
</label>


<input
id="passwordInput"
type="password"
placeholder="输入您的密码"
>


</div>




<button onclick="login()">

进入系统

</button>



<div 
id="loginError"
class="login-error">

</div>



</div>


</div>





<!-- 提示 -->

<div 
id="toast"
class="toast">

</div>






<!-- ================= 后台 ================= -->


<div 
id="appContainer"
class="app-container">



<div 
id="sidebar"
class="sidebar">

</div>




<div class="main-content">



<div class="top-bar">


<div class="top-bar-left">


<div 
id="breadcrumb"
class="breadcrumb">

</div>


</div>





<div class="top-bar-right">


<span 
id="dataTime"
class="data-time">

</span>



<div 
id="userAvatar"
class="user-avatar"
onclick="toggleUserDropdown()">

A

</div>




<div 
id="userDropdown"
class="user-dropdown">


<div 
class="item"
onclick="showChangePassword()">

修改密码

</div>


<div 
class="item danger"
onclick="logout()">

退出登录

</div>



</div>



</div>


</div>






<div 
id="pageContent">

</div>




</div>




</div>







<!-- 修改密码弹窗 -->


<div 
id="passwordModal"
class="modal-overlay">


<div class="modal">


<h3>
修改密码
</h3>



<div class="form-group">

<label>
当前密码
</label>

<input 
id="oldPassword"
type="password">

</div>




<div class="form-group">

<label>
新密码
</label>

<input 
id="newPassword"
type="password">

</div>




<div class="form-group">

<label>
确认新密码
</label>

<input 
id="confirmPassword"
type="password">

</div>



<div 
id="passwordError">

</div>




<div class="btn-row">


<button 
class="btn btn-secondary"
onclick="closePasswordModal()">

取消

</button>



<button
class="btn btn-primary"
onclick="changePassword()">

确认修改

</button>



</div>



</div>


</div>







<!-- JS -->

<script src="js/config.js"></script>

<script src="js/supabase.js"></script>

<script src="js/effects.js"></script>

<script src="js/login.js"></script>

<script src="js/charts.js"></script>

<script src="js/dashboard.js"></script>

<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>


<!-- 项目核心 -->
<script src="js/config.js"></script>

<script src="js/supabase.js"></script>


<!-- 页面效果 -->
<script src="js/effects.js"></script>


<!-- 图表 -->
<script src="js/charts.js"></script>


<!-- 后台 -->
<script src="js/dashboard.js"></script>


<!-- 登录 -->
<script src="js/login.js"></script>


</body>


</html>
