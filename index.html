<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>创艺品牌数据中心</title>


<!-- Echarts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>


<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<!-- 样式文件 -->
<link rel="stylesheet" href="css/style.css">


</head>



<body>


<!-- 粒子背景 -->
<canvas id="particleCanvas"></canvas>


<!-- 登录背景 -->
<div class="login-bg" id="loginBg"></div>



<!-- ================= 登录页面 ================= -->

<div id="loginPage" class="login-container">


    <div class="login-box" id="loginBox">


        <h2>
            创艺品牌数据中心
        </h2>


        <div class="subtitle">
            CHUANGYI BRAND DATA CENTER
        </div>



        <div class="input-group">

            <label>
                账号
            </label>


            <input 
            type="text" 
            id="usernameInput"
            placeholder="输入您的账号"
            >

        </div>




        <div class="input-group">


            <label>
                密码
            </label>


            <input 
            type="password"
            id="passwordInput"
            placeholder="输入您的密码"
            >


        </div>



        <button onclick="login()">

            进入系统

        </button>



        <div 
        id="loginError" 
        class="login-error">
        </div>



    </div>


</div>





<!-- 提示框 -->

<div 
class="toast" 
id="toast">

</div>






<!-- ================= 后台系统 ================= -->


<div 
id="appContainer" 
class="app-container">



    <!-- 左侧菜单 -->

    <div 
    class="sidebar" 
    id="sidebar">


    </div>





    <!-- 主内容区域 -->

    <div class="main-content">



        <div class="top-bar">


            <div class="top-bar-left">


                <div 
                class="breadcrumb" 
                id="breadcrumb">
                
                </div>


            </div>




            <div class="top-bar-right">


                <span 
                class="data-time" 
                id="dataTime">
                
                </span>




                <div 
                class="user-avatar" 
                id="userAvatar"
                onclick="toggleUserDropdown()">

                    A

                </div>



                <div 
                class="user-dropdown" 
                id="userDropdown">


                    <div 
                    class="item"
                    onclick="showChangePassword()">

                        修改密码

                    </div>



                    <div 
                    class="item danger"
                    onclick="logout()">

                        退出登录

                    </div>



                </div>



            </div>



        </div>




        <!-- 页面内容 -->

        <div 
        id="pageContent">


        </div>




    </div>




</div>
