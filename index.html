<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频运营看板 | 创艺 & 喜客喜</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1f;
      color: #e0e6f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 动态登录背景 ===== */
    .login-container {
      display: flex; justify-content: center; align-items: center; height: 100vh;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0a0f1f 0%, #141a2e 50%, #0d1225 100%);
    }
    .login-bg-animation {
      position: absolute; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(43,108,245,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(245,166,35,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(0,200,255,0.1) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }
    .login-box {
      position: relative; z-index: 10;
      background: rgba(20,26,46,0.85); backdrop-filter: blur(16px);
      padding: 45px 40px; border-radius: 20px; text-align: center;
      width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(43,108,245,0.2);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-box h2 {
      font-size: 26px; color: #fff; margin-bottom: 8px; font-weight: 600;
    }
    .login-box .subtitle {
      font-size: 14px; color: #7a85a0; margin-bottom: 28px;
    }
    .input-group {
      margin-bottom: 18px; text-align: left;
    }
    .input-group label {
      display: block; font-size: 13px; color: #8a95b0; margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .login-box input {
      width: 100%; padding: 13px 16px;
      border: 1px solid #2a3455; background: #0d1225; color: #fff;
      border-radius: 10px; font-size: 15px; outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }
    .login-box input:focus {
      border-color: #2b6cf5; box-shadow: 0 0 12px rgba(43,108,245,0.3);
    }
    .login-box button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #2b6cf5, #1f5ad6);
      border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 5px;
    }
    .login-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(43,108,245,0.4);
    }
    .login-error {
      color: #f77272; margin-top: 14px; font-size: 14px; min-height: 20px;
    }

    /* ===== 主看板 ===== */
    .dashboard { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .top-bar h1 { font-size: 28px; color: #fff; }
    .logout-btn {
      background: rgba(255,255,255,0.05); padding: 9px 20px; border-radius: 8px;
      color: #b0c0e0; text-decoration: none; font-size: 14px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .tabs {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .tab {
      padding: 10px 26px; background: #141a2e; border-radius: 8px;
      border: 1px solid #2a3455; color: #8a95b0; cursor: pointer;
      font-size: 16px; transition: 0.2s;
    }
    .tab.active {
      background: #1f2a45; border-color: #2b6cf5; color: #fff;
      box-shadow: 0 0 10px rgba(43,108,245,0.3);
    }

    .card {
      background: #12182b; border-radius: 12px; padding: 20px;
      border: 1px solid #1e2940; margin-bottom: 20px;
    }
    .card h3 {
      font-size: 18px; margin-bottom: 16px; color: #d0d8f0;
      display: flex; align-items: center; gap: 8px;
    }

    .grid-2 {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      margin-bottom: 20px;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 8px; color: #8a95b0; font-weight: 500;
      border-bottom: 1px solid #1e2940; font-size: 14px;
    }
    td {
      padding: 10px 8px; border-bottom: 1px solid #1a2238;
      font-size: 14px; color: #c0c8e0;
    }
    tr:last-child td { border-bottom: none; }

    .data-cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .data-item {
      background: #0d1225; padding: 16px; border-radius: 10px;
      border: 1px solid #1e2940; text-align: center;
    }
    .data-item .label { font-size: 13px; color: #7a85a0; margin-bottom: 8px; }
    .data-item .value { font-size: 26px; font-weight: 700; color: #fff; }

    .chart-box {
      width: 100%; height: 350px;
    }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .data-cards { grid-template-columns: 1fr; }
      .login-box { width: 90%; padding: 30px 25px; }
    }
  </style>
</head>
<body>
  <!-- 动态登录页 -->
  <div id="loginPage" class="login-container">
    <div class="login-bg-animation"></div>
    <div class="login-box">
      <h2>📊 视频运营看板</h2>
      <div class="subtitle">创艺装饰 & 喜客喜装饰</div>
      <div class="input-group">
        <label>账号</label>
        <input type="text" id="usernameInput" placeholder="请输入账号">
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="passwordInput" placeholder="请输入密码">
      </div>
      <button onclick="login()">登 录</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- 数据看板 -->
  <div id="dashboard" class="dashboard">
    <div class="top-bar">
      <h1>🎬 月度视频运营数据</h1>
      <a class="logout-btn" onclick="logout()">退出登录</a>
    </div>

    <div class="tabs">
      <div class="tab active" data-brand="创艺装饰" onclick="switchBrand('创艺装饰')">创艺装饰</div>
      <div class="tab" data-brand="喜客喜装饰" onclick="switchBrand('喜客喜装饰')">喜客喜装饰</div>
    </div>

    <div id="brandContent"></div>
  </div>

  <script>
    let appData = null;
    let currentBrand = '创艺装饰';

    // 加载数据
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        appData = data;
      })
      .catch(err => console.error('数据加载失败', err));

    // 登录验证
    function login() {
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();
      const errEl = document.getElementById('loginError');

      if (!appData) {
        errEl.textContent = '数据加载中，请稍后重试';
        return;
      }

      // 检查用户列表（支持多账号）
      const users = appData.users || [];
      const validUser = users.find(u => u.username === username && u.password === password);

      if (validUser) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderBrand(currentBrand);
      } else {
        errEl.textContent = '账号或密码错误';
      }
    }

    function logout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('usernameInput').value = '';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    function switchBrand(brand) {
      currentBrand = brand;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.brand === brand);
      });
      renderBrand(brand);
    }

    function renderBrand(brand) {
      if (!appData) return;
      const container = document.getElementById('brandContent');
      const brandData = appData.monthly_plan.find(b => b.brand === brand);
      if (!brandData) return;

      const items = brandData.items;
      const videoStats = appData.video_data || [];

      // 树状图数据
      const typeMap = new Map();
      items.forEach(item => {
        if (!typeMap.has(item.type)) typeMap.set(item.type, []);
        typeMap.get(item.type).push(item.project);
      });
      const treeData = {
        name: brand,
        children: Array.from(typeMap.entries()).map(([type, projects]) => ({
          name: type,
          children: projects.map(p => ({ name: p }))
        }))
      };

      const weeks = appData.weekly_tasks || [];

      let html = `
        <div class="grid-2">
          <div class="card">
            <h3>📅 本月视频计划</h3>
            <table>
              <tr><th>视频项目</th><th>类型</th><th>发布日期</th></tr>
              ${items.map(item => `
                <tr><td>${item.project}</td><td>${item.type}</td><td>${item.date}</td></tr>
              `).join('')}
            </table>
          </div>
          <div class="card">
            <h3>📹 各平台数据</h3>
            <div class="data-cards">
              ${videoStats.map(v => `
                <div class="data-item">
                  <div class="label">${v.platform}</div>
                  <div class="value">${formatNumber(v.views)}</div>
                  <div style="display:flex; justify-content:space-around; margin-top:8px; color:#7a85a0; font-size:13px;">
                    <span>👍 ${v.likes}</span>
                    <span>💬 ${v.comments}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>🌳 视频类型树状图</h3>
            <div id="treeChart" class="chart-box"></div>
          </div>
          <div class="card">
            <h3>📊 每周执行汇总</h3>
            <div id="weekChart" class="chart-box"></div>
          </div>
        </div>
      `;
      container.innerHTML = html;

      // 树状图
      const treeDom = document.getElementById('treeChart');
      if (treeDom) {
        const treeChart = echarts.init(treeDom);
        treeChart.setOption({
          tooltip: { trigger: 'item' },
          series: [{
            type: 'tree',
            data: [treeData],
            top: '5%', left: '10%', bottom: '5%', right: '15%',
            symbolSize: 8,
            orient: 'LR',
            label: {
              position: 'right', verticalAlign: 'middle', align: 'left',
              fontSize: 12, color: '#c0c8e0'
            },
            leaves: {
              label: { position: 'right', verticalAlign: 'middle', align: 'left' }
            },
            expandAndCollapse: true,
            animationDuration: 550,
            animationDurationUpdate: 750
          }]
        });
        window.addEventListener('resize', () => treeChart.resize());
      }

      // 柱状图
      const weekDom = document.getElementById('weekChart');
      if (weekDom) {
        const weekChart = echarts.init(weekDom);
        weekChart.setOption({
          tooltip: { trigger: 'axis' },
          legend: {
            data: ['出片数', '拍摄数'],
            textStyle: { color: '#8a95b0' }
          },
          xAxis: {
            type: 'category',
            data: weeks.map(w => w.week),
            axisLabel: { color: '#8a95b0', rotate: 15 }
          },
          yAxis: {
            type: 'value',
            axisLabel: { color: '#8a95b0' }
          },
          series: [
            {
              name: '出片数', type: 'bar',
              data: weeks.map(w => w.output),
              color: '#2b6cf5'
            },
            {
              name: '拍摄数', type: 'bar',
              data: weeks.map(w => w.shoot),
              color: '#f5a623'
            }
          ]
        });
        window.addEventListener('resize', () => weekChart.resize());
      }
    }

    function formatNumber(num) {
      if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }
  </script>
</body>
</html>
