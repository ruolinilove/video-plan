<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创艺品牌数据中心</title>
  
  <!-- 外部库 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  
  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Three.js 背景容器 -->
  <canvas id="bgCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>
  <div class="login-bg" id="loginBg"></div>

  <!-- 登录页 -->
  <div id="loginPage" class="login-container">
    <div class="login-box" id="loginBox">
      <h2>创艺品牌数据中心</h2>
      <div class="subtitle">CHUANGYI BRAND DATA CENTER</div>
      <div class="input-group">
        <label>账号</label>
        <input type="text" id="usernameInput" placeholder="输入您的账号" onkeyup="if(event.key==='Enter')document.getElementById('passwordInput').focus()">
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="passwordInput" placeholder="输入您的密码" onkeyup="if(event.key==='Enter')window.login()">
      </div>
      <button onclick="window.login()">进入系统</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <!-- 主应用 -->
  <div id="appContainer" class="app-container">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <div class="breadcrumb" id="breadcrumb"></div>
        </div>
        <div class="top-bar-right">
          <span class="data-time" id="dataTime"></span>
          <div class="user-avatar" id="userAvatar" onclick="window.toggleUserDropdown()">A</div>
          <div class="user-dropdown" id="userDropdown">
            <div class="item" onclick="window.showChangePassword()">修改密码</div>
            <div class="item danger" onclick="window.logout()">退出登录</div>
          </div>
        </div>
      </div>
      <div id="pageContent"></div>
    </div>
  </div>

  <!-- 修改密码弹窗 -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal">
      <h3>修改密码</h3>
      <div class="form-group"><label>当前密码</label><input type="password" id="oldPassword"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="newPassword"></div>
      <div class="form-group"><label>确认新密码</label><input type="password" id="confirmPassword"></div>
      <div id="passwordError" style="color:#ef4444;font-size:13px;margin-bottom:10px;"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="window.closePasswordModal()">取消</button>
        <button class="btn btn-primary" onclick="window.changePassword()">确认修改</button>
      </div>
    </div>
  </div>

  <!-- JS 文件按依赖顺序加载 -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/login.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
