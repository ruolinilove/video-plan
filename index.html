<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频运营看板 | 创艺 & 喜客喜</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #060b1f;
      color: #c8d0e0;
      overflow-x: hidden;
    }
    /* 全局微动背景 */
    body::before {
      content: "";
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(24, 144, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(245, 166, 35, 0.06) 0%, transparent 50%);
      z-index: 0; pointer-events: none;
    }
    .dashboard { position: relative; z-index: 1; padding: 20px; max-width: 1440px; margin: 0 auto; }

    /* 登录页 */
    .login-container {
      display: flex; justify-content: center; align-items: center; height: 100vh; position: relative; z-index: 2;
    }
    .login-box {
      background: rgba(14, 20, 40, 0.9); backdrop-filter: blur(20px);
      padding: 45px 40px; border-radius: 20px; width: 380px;
      border: 1px solid rgba(56, 128, 255, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 20px rgba(56,128,255,0.2);
      text-align: center;
    }
    .login-box h2 { font-size: 28px; color: #fff; margin-bottom: 6px; }
    .login-box .subtitle { font-size: 14px; color: #8a95b0; margin-bottom: 30px; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 13px; color: #8a95b0; margin-bottom: 6px; }
    .login-box input {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05);
      border: 1px solid #2a3455; border-radius: 10px; color: #fff; font-size: 15px;
      outline: none; transition: 0.3s;
    }
    .login-box input:focus { border-color: #3880ff; box-shadow: 0 0 12px rgba(56,128,255,0.3); }
    .login-box button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #2b6cf5, #1e4bd2);
      border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: 0.3s; margin-top: 8px;
    }
    .login-box button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(43,108,245,0.5); }
    .login-error { color: #f87171; margin-top: 15px; font-size: 14px; }

    /* 头部 */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; position: relative; z-index: 2;
    }
    .header h1 { font-size: 30px; color: #fff; text-shadow: 0 0 10px rgba(0,160,255,0.3); }
    .logout-btn {
      background: rgba(255,255,255,0.05); padding: 9px 20px; border-radius: 8px;
      color: #b0c0e0; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s; font-size: 14px;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* 指标卡片行 */
    .kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
      margin-bottom: 25px;
    }
    .kpi-card {
      background: rgba(14, 20, 40, 0.8); backdrop-filter: blur(10px);
      border: 1px solid rgba(56,128,255,0.2); border-radius: 12px; padding: 20px;
      position: relative; overflow: hidden;
    }
    .kpi-card .kpi-title { font-size: 14px; color: #8a95b0; margin-bottom: 10px; }
    .kpi-card .kpi-value { font-size: 32px; font-weight: 700; color: #fff; }
    .kpi-card .kpi-sub { font-size: 12px; color: #5a6a8a; margin-top: 6px; }
    .kpi-card::after {
      content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px;
      background: linear-gradient(135deg, transparent 40%, rgba(56,128,255,0.15));
      border-radius: 0 0 0 60px;
    }

    /* 品牌切换 */
    .brand-tabs {
      display: flex; gap: 12px; margin-bottom: 25px;
    }
    .brand-tab {
      padding: 10px 28px; background: rgba(14,20,40,0.8); border-radius: 8px;
      border: 1px solid #253050; color: #8a95b0; cursor: pointer;
      font-size: 16px; transition: 0.2s; backdrop-filter: blur(10px);
    }
    .brand-tab.active {
      background: rgba(56,128,255,0.2); border-color: #3880ff; color: #fff;
      box-shadow: 0 0 15px rgba(56,128,255,0.3);
    }

    /* 卡片 */
    .card {
      background: rgba(14, 20, 40, 0.75); backdrop-filter: blur(10px);
      border-radius: 14px; padding: 20px; border: 1px solid rgba(56,128,255,0.15);
      margin-bottom: 20px; transition: 0.2s;
    }
    .card:hover { border-color: rgba(56,128,255,0.3); }
    .card h3 {
      font-size: 18px; margin-bottom: 18px; color: #d0d8f0;
      display: flex; align-items: center; gap: 8px;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 12px 10px; color: #8a95b0; font-weight: 500;
      border-bottom: 1px solid #1e2a45; font-size: 14px;
    }
    td {
      padding: 12px 10px; border-bottom: 1px solid #161f30; font-size: 14px; color: #c0c8e0;
    }
    tr:last-child td { border-bottom: none; }

    /* 平台数据卡片 */
    .platform-cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;
    }
    .platform-item {
      background: rgba(0,0,0,0.25); border-radius: 10px; padding: 16px;
      border: 1px solid #1e2a45; text-align: center;
    }
    .platform-item .name { font-size: 16px; margin-bottom: 10px; color: #bcc4e0; }
    .platform-item .metric { margin: 8px 0; display: flex; justify-content: space-between; font-size: 14px; }
    .progress-bar {
      height: 6px; background: #1e2a45; border-radius: 3px; margin: 6px 0 12px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2b6cf5, #00c6ff); border-radius: 3px; }

    /* 周计划切换 */
    .week-tabs {
      display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;
    }
    .week-tab {
      padding: 6px 16px; border-radius: 20px; background: rgba(255,255,255,0.05);
      border: 1px solid #253050; color: #8a95b0; cursor: pointer; font-size: 13px;
    }
    .week-tab.active {
      background: rgba(56,128,255,0.25); border-color: #3880ff; color: #fff;
    }
    .task-tag {
      display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px;
      background: rgba(43,108,245,0.15); color: #3880ff;
    }
    .task-tag.shoot { background: rgba(245,166,35,0.15); color: #f5a623; }
    .task-tag.edit { background: rgba(0,200,255,0.15); color: #00c6ff; }
    .task-tag.publish { background: rgba(46, 204, 113,0.15); color: #2ecc71; }
    .task-tag.other { background: rgba(149, 165, 166,0.15); color: #95a5a6; }

    .chart-box { width: 100%; height: 300px; }

    @media (max-width: 768px) {
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- 登录 -->
  <div id="loginPage" class="login-container">
    <div class="login-box">
      <h2>📊 视频运营看板</h2>
      <div class="subtitle">创艺装饰 & 喜客喜装饰</div>
      <div class="input-group"><label>账号</label><input type="text" id="usernameInput" placeholder="请输入账号"></div>
      <div class="input-group"><label>密码</label><input type="password" id="passwordInput" placeholder="请输入密码"></div>
      <button onclick="login()">登 录</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- 看板 -->
  <div id="dashboard" class="dashboard" style="display:none;">
    <div class="header">
      <h1>🎬 视频运营指挥舱</h1>
      <a class="logout-btn" onclick="logout()">退出登录</a>
    </div>

    <!-- KPI -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- 品牌切换 -->
    <div class="brand-tabs">
      <div class="brand-tab active" data-brand="创艺装饰" onclick="switchBrand('创艺装饰')">创艺装饰</div>
      <div class="brand-tab" data-brand="喜客喜装饰" onclick="switchBrand('喜客喜装饰')">喜客喜装饰</div>
    </div>

    <!-- 动态内容区域 -->
    <div id="brandContent"></div>
  </div>

  <script>
    let appData = null, currentBrand = '创艺装饰';

    fetch('data.json').then(r => r.json()).then(d => { appData = d; }).catch(e => console.error(e));

    function login() {
      const user = document.getElementById('usernameInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      const err = document.getElementById('loginError');
      if (!appData) { err.textContent = '数据加载中，请稍后重试'; return; }
      const valid = (appData.users || []).find(u => u.username === user && u.password === pass);
      if (valid) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderAll();
      } else {
        err.textContent = '账号或密码错误';
      }
    }

    function logout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('usernameInput').value = '';
      document.getElementById('passwordInput').value = '';
    }

    function switchBrand(brand) {
      currentBrand = brand;
      document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand === brand));
      renderBrandContent(brand);
    }

    function renderAll() {
      updateKPIs();
      renderBrandContent(currentBrand);
    }

    function updateKPIs() {
      if (!appData) return;
      const planItems = appData.monthly_plan.flatMap(b => b.items);
      const totalVideos = planItems.length;
      const totalViews = appData.video_data.reduce((s, v) => s + (v.views || 0), 0);
      const publishedCount = planItems.filter(i => new Date(i.date.replace('月', '/')) < new Date()).length; // 简单估算
      const inProgress = totalVideos - publishedCount;

      document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card"><div class="kpi-title">📅 月度计划视频</div><div class="kpi-value" id="kpiTotal">${totalVideos}</div><div class="kpi-sub">两个品牌合计</div></div>
        <div class="kpi-card"><div class="kpi-title">👁️ 全平台总播放</div><div class="kpi-value">${formatKPI(totalViews)}</div><div class="kpi-sub">实时更新</div></div>
        <div class="kpi-card"><div class="kpi-title">✅ 已发布视频</div><div class="kpi-value">${publishedCount}</div><div class="kpi-sub">截至今日</div></div>
        <div class="kpi-card"><div class="kpi-title">⏳ 待拍摄/制作</div><div class="kpi-value">${inProgress}</div><div class="kpi-sub">剩余计划</div></div>
      `;
    }

    function formatKPI(num) {
      if (num >= 100000000) return (num / 100000000).toFixed(1) + '亿';
      if (num >= 10000) return (num / 10000).toFixed(1) + '万';
      return num.toLocaleString();
    }

    let currentWeekIndex = 0;

    function renderBrandContent(brand) {
      if (!appData) return;
      const container = document.getElementById('brandContent');
      const brandData = appData.monthly_plan.find(b => b.brand === brand);
      if (!brandData) return;
      const items = brandData.items;
      const videoStats = appData.video_data;
      const weeks = appData.weekly_tasks;
      const weekDetails = appData.weekly_details || [];

      // 类型分布数据
      const typeCount = {};
      items.forEach(i => typeCount[i.type] = (typeCount[i.type] || 0) + 1);
      const pieData = Object.entries(typeCount).map(([name, value]) => ({ name, value }));

      let html = `
        <div class="grid-2">
          <div class="card">
            <h3>📅 ${brand} · 月度发布计划</h3>
            <table>
              <tr><th>视频项目</th><th>类型</th><th>发布日期</th></tr>
              ${items.map(i => `<tr><td>${i.project}</td><td>${i.type}</td><td>${i.date}</td></tr>`).join('')}
            </table>
          </div>
          <div class="card">
            <h3>📹 各平台数据</h3>
            <div class="platform-cards">
              ${videoStats.map(v => {
                const maxView = Math.max(...videoStats.map(x => x.views), 1);
                const percent = (v.views / maxView * 100).toFixed(0);
                return `
                <div class="platform-item">
                  <div class="name">${v.platform}</div>
                  <div class="metric"><span>播放</span><span>${formatNum(v.views)}</span></div>
                  <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                  <div class="metric"><span>👍 点赞</span><span>${v.likes}</span></div>
                  <div class="metric"><span>💬 评论</span><span>${v.comments}</span></div>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>📈 每周执行汇总</h3>
            <div id="weekBarChart" class="chart-box"></div>
          </div>
          <div class="card">
            <h3>🎯 视频类型分布</h3>
            <div id="typePieChart" class="chart-box"></div>
          </div>
        </div>

        <div class="card">
          <h3>📋 周计划执行表</h3>
          <div class="week-tabs" id="weekTabBar"></div>
          <div style="overflow-x:auto;">
            <table id="weekDetailTable">
              <thead><tr><th>日期</th><th>动作</th><th>详细任务</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      `;
      container.innerHTML = html;

      // 绘制柱状图
      const barDom = document.getElementById('weekBarChart');
      if (barDom) {
        const chart = echarts.init(barDom);
        chart.setOption({
          tooltip: { trigger: 'axis' },
          grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
          xAxis: { type: 'category', data: weeks.map(w => w.week), axisLabel: { color: '#8a95b0', rotate: 15 } },
          yAxis: { type: 'value', axisLabel: { color: '#8a95b0' } },
          series: [
            { name: '出片数', type: 'bar', data: weeks.map(w => w.output), color: '#3880ff', barWidth: '20' },
            { name: '拍摄数', type: 'bar', data: weeks.map(w => w.shoot), color: '#f5a623', barWidth: '20' }
          ]
        });
        window.addEventListener('resize', () => chart.resize());
      }

      // 饼图
      const pieDom = document.getElementById('typePieChart');
      if (pieDom) {
        const chart = echarts.init(pieDom);
        chart.setOption({
          tooltip: { trigger: 'item' },
          series: [{
            type: 'pie', radius: ['45%', '70%'],
            data: pieData,
            label: { color: '#c8d0e0' },
            itemStyle: { borderRadius: 6, borderColor: '#0e1428', borderWidth: 2 }
          }]
        });
        window.addEventListener('resize', () => chart.resize());
      }

      // 周计划详情
      renderWeekDetail(weekDetails, 0);
    }

    function renderWeekDetail(weekDetails, index) {
      currentWeekIndex = index;
      const tabs = weekDetails.map((w, i) => `
        <div class="week-tab ${i === index ? 'active' : ''}" onclick="switchWeek(${i})">${w.week.replace(' (', '<br>(')}</div>
      `).join('');
      document.getElementById('weekTabBar').innerHTML = tabs;

      const current = weekDetails[index];
      if (!current) return;
      const tbody = document.querySelector('#weekDetailTable tbody');
      tbody.innerHTML = current.tasks.map(t => {
        let tagClass = '';
        if (t.tag === '拍摄') tagClass = 'shoot';
        else if (t.tag === '剪辑' || t.tag === '整理+文案' || t.tag === '定稿' || t.tag === '审核') tagClass = 'edit';
        else if (t.tag === '发布') tagClass = 'publish';
        else tagClass = 'other';
        return `<tr>
          <td>${t.day}</td>
          <td><span class="task-tag ${tagClass}">${t.action}</span></td>
          <td>${t.detail}</td>
        </tr>`;
      }).join('');
    }

    function switchWeek(index) {
      if (!appData) return;
      renderWeekDetail(appData.weekly_details || [], index);
    }

    function formatNum(num) {
      if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    // 初始化加载完成后自动渲染
    setTimeout(() => { if (appData && document.getElementById('dashboard').style.display === 'block') renderAll(); }, 300);
  </script>
</body>
</html>
